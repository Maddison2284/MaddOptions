client_id = "609278136eb7513858da1379e6d055fb"
name = "MaddOptions Dev"
application_url = "https://localhost"
embedded = true

[build]
automatically_update_urls_on_dev = true
include_config_on_deploy = true

[webhooks]
api_version = "2026-04"

[[webhooks.subscriptions]]
topics = ["app/scopes_update"]
uri = "/webhooks/app/scopes_update"

[[webhooks.subscriptions]]
topics = ["app/uninstalled"]
uri = "/webhooks/app/uninstalled"

[access_scopes]
scopes = "write_metaobject_definitions,write_metaobjects,write_products"
optional_scopes = []
use_legacy_install_flow = false

[auth]
redirect_urls = [
  "https://localhost/auth/callback",
  "https://localhost/api/auth/callback",
]

[app_proxy]
url = "https://localhost/apps/maddoptions"
subpath = "maddoptions"
prefix = "apps"